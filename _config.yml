    output: true
    permalink: "/:collection/:name/"
  posts:
    title: Posts
    output: true
  uploads:
    title: Uploads
    output: true
defaults:
- scope:
    path: ''
    type: posts
  values:
    layout: post
    author: Dominicus In
- scope:
    path: ''
    type: pages
  values:
    layout: page
email: contact@dominicu_sin.io
description: Blog about industrial engineering, systems engineering, and data science.  Expert
  materials on key areas of knowledge and modern approaches.
baseurl: ''
url: https://dominicusin.github.io
twitter_username: dominicusin
github_username: dominicusin
author:
  name: Dominicus In
  email: contact@dominicu_sin.io
  github: dominicusin
  twitter: dominicusin
  orcid: 0000-0002-7425-0526
navigation:
- name: Home
  url: "/"
- name: About
  url: "/about/"
- name: Archive
  url: "/archive/"
- name: Categories
  url: "/categories/"
- name: Tags
  url: "/tags/"
keywords: industrial engineering, systems engineering, data science, blog, technology
lang: en
locale: en_US
