<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
{% include head.html }

<body class="{% if page.layout %}layout-{{ page.layout }}{% endif %}">
  <!-- Skip navigation link for accessibility -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  {% include header.html %}

  <main id="main-content" class="page-content" aria-label="Content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  {% include footer.html %}

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": {{ site.title | jsonify }},
    "url": {{ site.url | append: site.baseurl | jsonify }},
    "description": {{ site.description | jsonify }},
    "potentialAction": {
      "@type": "SearchAction",
      "target": "{{ site.url | append: site.baseurl }}/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": {{ site.title | jsonify }},
    "url": {{ site.url | append: site.baseurl | jsonify }},
    "logo": "{{ site.url | append: site.baseurl }}/favicon.svg"
  }
  </script>

  <!-- Main JavaScript -->
  <script src="{{ '/js/main.js' | prepend: site.baseurl }}" defer></script>

  <!-- Analytics -->
  {% if jekyll.environment == 'production' %}
    <!-- Add your analytics code here -->
  {% endif %}
</body>
</html>
