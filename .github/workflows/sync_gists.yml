- name: Fetch Gists and write to disk
  uses: actions/github-script@v6
  env:
    GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
  with:
    script: |
      const fs = require('fs');
      const path = require('path');

      const outDir = 'gists';
      const username = 'dominicusin';

      if (!fs.existsSync(outDir)) fs.mkdirSync(outDir, { recursive: true });

      const response = await github.request('GET /users/{username}/gists', {
        username,
        per_page: 100,
        headers: { Authorization: `token ${process.env.GITHUB_TOKEN}` }
      });
      const gists = response.data || [];

      for (const gist of gists) {
        const gistDir = path.join(outDir, gist.id);
        if (!fs.existsSync(gistDir)) fs.mkdirSync(gistDir, { recursive: true });

        for (const [filename, fileInfo] of Object.entries(gist.files || {})) {
          try {
            const raw = await github.request({
              method: 'GET',
              url: fileInfo.raw_url,
              headers: { Authorization: `token ${process.env.GITHUB_TOKEN}` }
            });
            fs.writeFileSync(path.join(gistDir, filename), raw.data, 'utf8');
          } catch (err) {
            core && core.warning && core.warning(`Failed to fetch ${fileInfo.raw_url}: ${err}`);
          }
        }
      }
