name: Sync Gists

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Fetch Gists and write to disk
        uses: actions/github-script@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const outDir = 'gists';
            const username = 'dominicusin';

            // Ensure output directory exists
            if (!fs.existsSync(outDir)) fs.mkdirSync(outDir, { recursive: true });

            const response = await github.rest.gists.listForUser({ username, per_page: 100 });
            const gists = response.data || [];

            for (const gist of gists) {
              const gistDir = path.join(outDir, gist.id);
              if (!fs.existsSync(gistDir)) fs.mkdirSync(gistDir, { recursive: true });

              for (const [filename, fileInfo] of Object.entries(gist.files || {})) {
                try {
                  const raw = await github.request({ method: 'GET', url: fileInfo.raw_url });
                  fs.writeFileSync(path.join(gistDir, filename), raw.data, 'utf8');
                } catch (err) {
                  core && core.warning && core.warning(`Failed to fetch ${fileInfo.raw_url}: ${err}`);
                }
              }
            }

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: update gists"
          commit_options: '--no-verify'
          branch: ${{ github.ref_name }}
          file_pattern: 'gists/*'
          repository: '.'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
