<!-- Social Sharing Component -->
<div class="social-sharing">
  <div class="share-buttons">
    <!-- Twitter/X -->
    <a href="https://twitter.com/intent/tweet?text={{ page.title | url_encode }}&url={{ page.url | absolute_url | url_encode }}&via={{ site.twitter_username | default: '' }}" 
       class="share-button share-twitter" 
       target="_blank" 
       rel="noopener noreferrer"
       title="Share on Twitter/X">
      <span class="share-icon">𝕏</span>
      <span class="share-text">Twitter</span>
    </a>

    <!-- LinkedIn -->
    <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ page.url | absolute_url | url_encode }}&title={{ page.title | url_encode }}" 
       class="share-button share-linkedin" 
       target="_blank" 
       rel="noopener noreferrer"
       title="Share on LinkedIn">
      <span class="share-icon">💼</span>
      <span class="share-text">LinkedIn</span>
    </a>

    <!-- Facebook -->
    <a href="https://www.facebook.com/sharer/sharer.php?u={{ page.url | absolute_url | url_encode }}" 
       class="share-button share-facebook" 
       target="_blank" 
       rel="noopener noreferrer"
       title="Share on Facebook">
      <span class="share-icon">📘</span>
      <span class="share-text">Facebook</span>
    </a>

    <!-- Reddit -->
    <a href="https://reddit.com/submit?url={{ page.url | absolute_url | url_encode }}&title={{ page.title | url_encode }}" 
       class="share-button share-reddit" 
       target="_blank" 
       rel="noopener noreferrer"
       title="Share on Reddit">
      <span class="share-icon">🤖</span>
      <span class="share-text">Reddit</span>
    </a>

    <!-- Hacker News -->
    <a href="https://news.ycombinator.com/submitlink?u={{ page.url | absolute_url | url_encode }}&t={{ page.title | url_encode }}" 
       class="share-button share-hackernews" 
       target="_blank" 
       rel="noopener noreferrer"
       title="Share on Hacker News">
      <span class="share-icon">🍊</span>
      <span class="share-text">Hacker News</span>
    </a>

    <!-- Copy Link -->
    <button class="share-button share-copy" 
            onclick="copyToClipboard('{{ page.url | absolute_url }}', this)"
            title="Copy link to clipboard">
      <span class="share-icon">📋</span>
      <span class="share-text">Copy</span>
    </button>
  </div>
</div>

<script>
function copyToClipboard(text, button) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      showCopySuccess(button);
    }).catch(() => {
      fallbackCopy(text, button);
    });
  } else {
    fallbackCopy(text, button);
  }
}

function fallbackCopy(text, button) {
  const textArea = document.createElement('textarea');
  textArea.value = text;
  textArea.style.position = 'fixed';
  textArea.style.left = '-999999px';
  textArea.style.top = '-999999px';
  document.body.appendChild(textArea);
  textArea.focus();
  textArea.select();
  
  try {
    document.execCommand('copy');
    showCopySuccess(button);
  } catch (err) {
    console.error('Failed to copy text: ', err);
    showCopyError(button);
  }
  
  document.body.removeChild(textArea);
}

function showCopySuccess(button) {
  const originalText = button.querySelector('.share-text').textContent;
  button.querySelector('.share-text').textContent = 'Copied!';
  button.classList.add('copied');
  
  setTimeout(() => {
    button.querySelector('.share-text').textContent = originalText;
    button.classList.remove('copied');
  }, 2000);
}

function showCopyError(button) {
  const originalText = button.querySelector('.share-text').textContent;
  button.querySelector('.share-text').textContent = 'Error!';
  button.classList.add('error');
  
  setTimeout(() => {
    button.querySelector('.share-text').textContent = originalText;
    button.classList.remove('error');
  }, 2000);
}
</script>
