<!-- Comments Section -->
<div class="comments-section">
  <div id="disqus_thread" data-disqus-shortname="{{ site.disqus_shortname }}"></div>
  
  <noscript>
    <p>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></p>
  </noscript>
  
  <!-- Alternative comment systems can be added here -->
  <div class="alternative-comments" style="display: none;">
    <h4>Comments</h4>
    <p>Join the discussion on this post:</p>
    
    <!-- GitHub Issues as comments -->
    {% if page.github_comments %}
    <div class="github-comments">
      <p>
        <a href="{{ page.github_comments }}" target="_blank" rel="noopener noreferrer">
          💬 Discuss on GitHub
        </a>
      </p>
    </div>
    {% endif %}
    
    <!-- Manual comment form -->
    <form class="comment-form" action="#" method="post" onsubmit="handleCommentSubmit(event)">
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
      </div>
      
      <div class="form-group">
        <label for="email">Email (optional)</label>
        <input type="email" id="email" name="email">
      </div>
      
      <div class="form-group">
        <label for="comment">Comment</label>
        <textarea id="comment" name="comment" rows="4" required></textarea>
      </div>
      
      <button type="submit" class="submit-btn">Post Comment</button>
    </form>
  </div>
</div>

<script>
// Disqus integration
if (window.DISQUS) {
  DISQUS.reset({
    reload: true,
    config: function () {
      this.page.identifier = "{{ page.url }}";
      this.page.url = "{{ page.url | absolute_url }}";
    }
  });
} else {
  const disqus_config = function () {
    this.page.url = "{{ page.url | absolute_url }}";
    this.page.identifier = "{{ page.url }}";
  };
  
  (function() {
    const d = document, s = d.createElement('script');
    s.src = 'https://{{ site.disqus_shortname }}.disqus.com/embed.js';
    s.setAttribute('data-timestamp', +new Date());
    (d.head || d.body).appendChild(s);
  })();
}

// Fallback comment handler
function handleCommentSubmit(event) {
  event.preventDefault();
  
  const formData = new FormData(event.target);
  const comment = {
    name: formData.get('name'),
    email: formData.get('email'),
    comment: formData.get('comment'),
    page: "{{ page.url }}",
    timestamp: new Date().toISOString()
  };
  
  // Store comment locally (in a real implementation, send to server)
  const comments = JSON.parse(localStorage.getItem('comments') || '[]');
  comments.push(comment);
  localStorage.setItem('comments', JSON.stringify(comments));
  
  // Show success message
  showCommentSuccess();
  
  // Reset form
  event.target.reset();
}

function showCommentSuccess() {
  const message = document.createElement('div');
  message.className = 'comment-success';
  message.textContent = 'Thank you for your comment! It will appear after moderation.';
  
  const form = document.querySelector('.comment-form');
  form.parentNode.insertBefore(message, form);
  
  setTimeout(() => {
    message.remove();
  }, 5000);
}

// Load stored comments if Disqus is not available
if (!window.DISQUS && !document.querySelector('#disqus_thread script')) {
  setTimeout(() => {
    const altComments = document.querySelector('.alternative-comments');
    if (altComments) {
      altComments.style.display = 'block';
      loadStoredComments();
    }
  }, 2000);
}

function loadStoredComments() {
  const comments = JSON.parse(localStorage.getItem('comments') || '[]');
  const pageComments = comments.filter(c => c.page === "{{ page.url }}");
  
  if (pageComments.length > 0) {
    const commentsContainer = document.createElement('div');
    commentsContainer.className = 'stored-comments';
    
    pageComments.forEach(comment => {
      const commentElement = createCommentElement(comment);
      commentsContainer.appendChild(commentElement);
    });
    
    const altComments = document.querySelector('.alternative-comments');
    altComments.appendChild(commentsContainer);
  }
}

function createCommentElement(comment) {
  const element = document.createElement('div');
  element.className = 'stored-comment';
  element.innerHTML = `
    <div class="comment-header">
      <strong>${comment.name}</strong>
      <span class="comment-date">${new Date(comment.timestamp).toLocaleDateString()}</span>
    </div>
    <div class="comment-body">${comment.comment}</div>
  `;
  return element;
}
</script>
